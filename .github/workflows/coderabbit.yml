name: CodeRabbit Security Review

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress runs on new pushes to the same branch
concurrency:
  group: coderabbit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coderabbit-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip draft PRs and automated bots
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.actor, '[bot]')

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: CodeRabbit Review
        uses: coderabbitai/ai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
          # Focus areas for every review
          system_message: |
            You are an expert code reviewer specializing in security, Web3/blockchain
            operations, and JavaScript/Node.js best practices.
            Focus on: security vulnerabilities, hardcoded secrets, unsafe transaction
            handling, missing error handling, and code correctness.
            Be concise. Skip nitpicks. Prioritize critical and major issues.

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
