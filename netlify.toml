[build]
  publish = "dist"
  command = "npm run build"

# ─── Edge Functions ────────────────────────────────────────────────────────
# Bot prerender: intercepts bot/crawler requests and returns full HTML from Supabase.
# Cloudflare proxy is OFF (grey cloud), so edge function runs on every request.
# Requires env vars in Netlify dashboard: SUPABASE_URL, SUPABASE_ANON_KEY
[[edge_functions]]
  path = "/*"
  function = "bot-prerender"

# ─── Static File Serving ───────────────────────────────────────────────────
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/llms.txt"
  to = "/llms.txt"
  status = 200

# ─── Canonical Domain ─────────────────────────────────────────────────────
# Redirect .netlify.app subdomain to custom domain to prevent:
# - Duplicate content penalties
# - Google cloaking flags from serving SPA shell on .netlify.app
[[redirects]]
  from = "https://token-health-radar.netlify.app/*"
  to = "https://tokenhealthscan.com/:splat"
  status = 301
  force = true

# ─── Security Headers ─────────────────────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
